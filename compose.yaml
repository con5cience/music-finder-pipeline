# Local dev services mirroring the box. Port 5440 avoids clashing with the
# music-finder app's Postgres (5433/5434). Temporal dev runs via the SDK's
# in-process test env for tests and `temporal server start-dev` for manual runs;
# a Temporal service is added to this compose in the orchestration slice.
#
# The `music-factory` network is OWNED here (created on `up`) and joined by
# the sibling app's compose as external — the app container reaches this DB
# as pipeline-db:5432 for the admin Tier-C queue + pipeline facts. Host
# publishing stays loopback-only (5440); the shared network adds no off-host
# exposure. Bring the factory up before the app.
services:
  # Named factory-db (NOT `db`): compose adds the service name as a DNS alias
  # on EVERY attached network, and the serving app's project also has a `db`
  # — the collision made the app's own database lookups resolve HERE through
  # the shared music-factory network (live incident 2026-06-10). Unique name
  # = unambiguous DNS on shared networks; in-network consumers use the
  # pipeline-db alias.
  factory-db:
    image: pgvector/pgvector:pg16  # postgres:16 + the pgvector extension (embedding tables)
    restart: unless-stopped  # reboot audit: EVERYTHING depends on this one
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: pipeline
    ports:
      - "127.0.0.1:5440:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      default: {}
      factory:
        aliases:
          - pipeline-db

  # --- production-maturation services (2026-06-10) -----------------------
  # Temporal server persisted in the factory Postgres (its own database),
  # replacing `temporal server start-dev` (SQLite, user-owned process).
  temporal:
    image: temporalio/auto-setup:1.25
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: pipeline
      POSTGRES_PWD: pipeline
      POSTGRES_SEEDS: factory-db
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
    ports:
      - "127.0.0.1:7233:7233"
    depends_on:
      - factory-db

  temporal-ui:
    image: temporalio/ui:2.31.2
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "127.0.0.1:8233:8080"
    depends_on:
      - temporal

  # IO fleet: workflows + DB activities + per-platform crawl queues. CPU.
  worker-io:
    build: .
    image: music-finder-pipeline:local
    restart: unless-stopped
    command: ["--role", "io"]
    env_file: .env
    environment:
      PIPELINE_DATABASE_URL: postgresql://pipeline:pipeline@factory-db:5432/pipeline
      PIPELINE_TEMPORAL_ADDRESS: temporal:7233
      PIPELINE_FETCH_CACHE_DIR: /cache/fetch-cache
      PIPELINE_STAGE_DIR: /stage
    volumes:
      - fetch-cache:/cache/fetch-cache
      - clip-stage:/stage
    depends_on:
      - factory-db
      - temporal

  # GPU fleet: the embed queue only. Requires nvidia-container-toolkit on
  # the host (one-time: sudo apt install nvidia-container-toolkit &&
  # sudo nvidia-ctk runtime configure --runtime=docker && restart docker).
  worker-gpu:
    build: .  # every image-sharing service carries build: — a targeted
              # compose build silently NO-OPS without it (stale-image incident)
    image: music-finder-pipeline:local
    restart: unless-stopped
    command: ["--role", "gpu"]
    env_file: .env
    environment:
      PIPELINE_DATABASE_URL: postgresql://pipeline:pipeline@factory-db:5432/pipeline
      PIPELINE_TEMPORAL_ADDRESS: temporal:7233
      PIPELINE_FETCH_CACHE_DIR: /cache/fetch-cache
      PIPELINE_STAGE_DIR: /stage
      HF_HOME: /hf
      PIPELINE_GPU_CONCURRENCY: "2"  # proven ceiling (13.1GB peak). conc-4
      # REQUIRES true fp16 (model.half()) — autocast BACKFIRED live (it
      # caches fp16 weight copies per forward: fp32 + cache > fp32 alone;
      # 6 OOMs in 8 min). half() is a maintenance-window experiment.
      PIPELINE_FP16: "0"
    volumes:
      - fetch-cache:/cache/fetch-cache
      - clip-stage:/stage
      - hf-cache:/hf
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]
    depends_on:
      - factory-db
      - temporal

  # The mass build itself, reboot-proof: resumes from the ledgers on every
  # start (natural pagination — embedded artists and terminal verdicts drop
  # out of the seed query). Exits 0 on corpus exhaustion; on-failure restart
  # leaves a finished build finished.
  seeder:
    build: .
    image: music-finder-pipeline:local
    restart: on-failure
    entrypoint: [".venv/bin/python", "-m", "pipeline.wave_seeder"]
    # 500k > the 492,786 post-yt-gate denominator: the real stop is the
    # corpus-exhausted check, not this bound (451k would have stopped short).
    command: ["--total", "500000", "--batch", "1000", "--low-water", "2000"]
    environment:
      PIPELINE_DATABASE_URL: postgresql://pipeline:pipeline@factory-db:5432/pipeline
      PIPELINE_TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - factory-db
      - temporal

  # Hourly serving-DB sync (the FIRST standing automation — user-amended
  # the one-shot law for publish on 2026-06-11). Incremental: watermark
  # mode publishes only changed artists; prunes newly banned ones.
  publish-sync:
    build: .
    image: music-finder-pipeline:local
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do .venv/bin/python -m pipeline.publish --incremental --limit 100000; sleep 3600; done"]
    env_file: .env
    # host network: BOTH dbs bind loopback-only by design — the sync reaches
    # them as the host does, and the loopback-only posture stays intact.
    network_mode: host
    environment:
      PIPELINE_DATABASE_URL: postgresql://pipeline:pipeline@localhost:5440/pipeline
      APP_DATABASE_URL: postgresql://musicfinder:musicfinder@localhost:5433/musicfinder

  # ADR-019 standing discovery: crawl Bandcamp's tag tree, prune obvious
  # non-artists, admit a backlog-throttled trickle (small while the embed
  # backlog drains, full once clear), and score the provisional cohort for
  # AI-slop. env_file carries the proxy for the crawl; factory DB only (no
  # APP_DATABASE_URL — discovery never writes serving). Interval defaults daily.
  # Start it explicitly: docker compose up -d discover-sync.
  discover-sync:
    build: .
    image: music-finder-pipeline:local
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do .venv/bin/python -m pipeline.discovery --wave --admit-adaptive; sleep ${DISCOVER_INTERVAL:-86400}; done"]
    env_file: .env
    network_mode: host
    environment:
      PIPELINE_DATABASE_URL: postgresql://pipeline:pipeline@localhost:5440/pipeline

  # The watchdog that outlives every operator session: flatlined embeds for
  # two checks → force-recreate the workers (the wedged-reader class). Needs
  # the docker socket — the ONE privileged mount in the stack, for exactly
  # one verb (compose up -d --force-recreate).
  factory-doctor:
    image: docker:27-cli
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/workspace/scripts/factory-doctor.sh"]
    environment:
      PIPELINE_DATABASE_URL: postgresql://pipeline:pipeline@factory-db:5432/pipeline
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace:ro
    depends_on:
      - factory-db

networks:
  factory:
    name: music-factory

volumes:
  pgdata:
  fetch-cache:
  clip-stage:
  hf-cache:
