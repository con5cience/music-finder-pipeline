[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "music-finder-pipeline"
version = "0.1.0"
description = "Audio-first corpus pipeline (ADR-015): MB-bootstrapped, source-correct CLAP embeddings."
requires-python = ">=3.12,<3.13"
dependencies = [
    "temporalio>=1.7",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "ruff>=0.6",
]

[tool.hatch.build.targets.wheel]
packages = ["src/pipeline"]

[tool.ruff]
line-length = 120
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
